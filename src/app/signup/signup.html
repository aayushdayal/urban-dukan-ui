<div class="auth-container">
  <form class="auth-form" (ngSubmit)="signup()" #signupForm="ngForm">
    <h2>Create Account</h2>
    <div class="form-group">
      <input type="text" name="firstName" [(ngModel)]="firstName" placeholder="First Name" required>
      <input type="text" name="lastName" [(ngModel)]="lastName" placeholder="Last Name" required>
    </div>
    <div class="form-group">
      <input type="email" name="email" [(ngModel)]="email" placeholder="Email" required>
    </div>
    <div class="form-group">
      <input type="password" name="password" [(ngModel)]="password" placeholder="Password" required>
      <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" placeholder="Confirm Password" required>
    </div>
    <div class="form-group">
      <input type="text" name="address" [(ngModel)]="address" placeholder="Address" required>
      <input type="text" name="phone" [(ngModel)]="phone" placeholder="Phone" required>
    </div>
    <div class="form-group radio-group">
      <label>Signup as:</label>
      <label><input type="radio" name="userType" [(ngModel)]="userType" value="Buyer" required> Buyer</label>
      <label><input type="radio" name="userType" [(ngModel)]="userType" value="Seller" required> Seller</label>
    </div>
    <button type="submit">Sign Up</button>
    <div *ngIf="error" class="error">{{ error }}</div>
    <p>Already have an account? <a routerLink="/login">Login</a></p>
  </form>
</div>
