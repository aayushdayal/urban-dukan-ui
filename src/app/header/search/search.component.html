<div class="search-wrapper">
  <div class="search-box" role="search">
    <input
      type="text"
      class="search-input"
      placeholder="Search products, brands, categories..."
      [(ngModel)]="query"
      (input)="onInput()"
      (keydown)="onKeyDown($event)"
      aria-label="Search products"
    />
    <button class="search-btn" (click)="triggerSearch()" aria-label="Search">
      <svg class="icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zM10 14a4 4 0 110-8 4 4 0 010 8z"></path></svg>
    </button>

    <button class="clear-btn" *ngIf="query" (click)="clear()" aria-label="Clear search">×</button>

    <div class="loading-spinner" *ngIf="loading" aria-hidden="true"></div>
  </div>

  <ul class="suggestions" *ngIf="showDropdown && suggestions.length">
    <li
      class="suggestion"
      *ngFor="let s of suggestions; let i = index"
      (click)="selectSuggestion(s)"
      [class.selected]="i === selectedIndex"
      [innerHTML]="highlightSuggestion(s)">
    </li>
  </ul>
</div>
