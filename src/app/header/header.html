<nav class="navbar">
  <div class="nav-left">
    <a routerLink="/" class="logo">Urban Dukan</a>
  </div>
  <div class="nav-right">
    <ng-container *ngIf="!auth.isLoggedIn(); else loggedIn">
      <button class="nav-btn" (click)="openLogin()">Login</button>
      <button class="nav-btn" (click)="openSignup()">Sign Up</button>
    </ng-container>
    <ng-template #loggedIn>
      <div class="user-dropdown" (mouseenter)="showDropdown=true" (mouseleave)="showDropdown=false">
        <span class="user-name">{{ auth.getUserEmail() || 'User' }}</span>
        <span class="dropdown-arrow">▼</span>
        <div class="dropdown-menu" *ngIf="showDropdown">
          <button (click)="logout()">Logout</button>
        </div>
      </div>
    </ng-template>
  </div>

  <!-- Login Modal -->
  <div class="modal-overlay" *ngIf="showLoginModal" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <app-login
        [closeModal]="closeModal"
        [openSignup]="openSignup">
      </app-login>
    </div>
  </div>
  <!-- Signup Modal -->
  <div class="modal-overlay" *ngIf="showSignupModal" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <app-signup
        [closeModal]="closeModal"
        [openLogin]="openLogin">
      </app-signup>
    </div>
  </div>
</nav>
