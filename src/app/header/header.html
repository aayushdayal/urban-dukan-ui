<nav class="navbar">
  <div class="nav-left">
    <a routerLink="/" class="logo">Urban Dukan</a>
  </div>

  <!-- center: search bar -->
  <div class="nav-center">
    <app-search></app-search>
  </div>

  <div class="nav-right">
    <ng-container *ngIf="!auth.isLoggedIn(); else loggedIn">
      <button class="nav-btn" (click)="openLogin()">Login</button>
      <button class="nav-btn" (click)="openSignup()">Sign Up</button>
    </ng-container>

    <ng-template #loggedIn>
      <div class="user-area" title="{{ auth.getUserEmail() }}">
        <span class="user-email">{{ auth.getUserEmail() }}</span>
        <button class="nav-btn logout-btn" (click)="logout()" aria-label="Logout">Logout</button>
      </div>
    </ng-template>
  </div>

  <!-- Login Modal -->
  <div class="modal-overlay" *ngIf="showLoginModal" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <app-login
        [closeModal]="closeModalFn"
        [openSignup]="openSignupFromLogin">
      </app-login>
    </div>
  </div>

  <!-- Signup Modal -->
  <div class="modal-overlay" *ngIf="showSignupModal" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <app-signup
        [closeModal]="closeModalFn"
        [openLogin]="openLoginFromSignup">
      </app-signup>
    </div>
  </div>
</nav>
