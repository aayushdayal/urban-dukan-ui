<nav class="navbar">
  <div class="nav-left">
    <a routerLink="/" class="logo">Urban Dukan</a>
  </div>

  <!-- center: search bar -->
  <div class="nav-center">
    <app-search></app-search>
  </div>

  <div class="nav-right">
    <!-- Cart button: placed to the left of login/logout -->
    <button
      class="nav-btn cart-btn"
      *ngIf="auth.isLoggedIn()"
      (click)="goToCart()"
      aria-label="Open cart"
      title="Cart"
    >
      <svg class="icon" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M6 6h15l-1.5 9h-11L4 3H2" />
        <circle cx="9" cy="20" r="1.5" fill="#fff"></circle>
        <circle cx="18" cy="20" r="1.5" fill="#fff"></circle>
      </svg>
    </button>

    <!-- Orders button (visible only when logged in) -->
    <button
      class="nav-btn cart-btn"
      *ngIf="auth.isLoggedIn()"
      (click)="goToOrders()"
      aria-label="My orders"
      title="Orders"
    >
      <!-- receipt / order icon -->
      <svg class="icon" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
              d="M4 3h12v14l-4-2-4 2V3z" />
        <path fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
              d="M8 7h8M8 11h8M8 15h5" />
      </svg>
    </button>

    <ng-container *ngIf="!auth.isLoggedIn(); else loggedIn">
      <button class="nav-btn" (click)="openLogin()">Login</button>
      <button class="nav-btn" (click)="openSignup()">Sign Up</button>
    </ng-container>

    <ng-template #loggedIn>
      <div class="user-area" title="{{ auth.getUserEmail() }}">
      <!-- user icon added - click navigates to profile -->
      <button class="user-icon" (click)="goToProfile()" aria-label="Go to profile" title="Profile">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-4.418 0-8 2.239-8 5v1h16v-1c0-2.761-3.582-5-8-5z"/>
        </svg>
      </button>

      <span class="user-email">{{ auth.getUserEmail() }}</span>
      <button class="nav-btn logout-btn" (click)="logout()" aria-label="Logout">Logout</button>
    </div>
  </ng-template>
  </div>

  <!-- Login Modal -->
  <div class="modal-overlay" *ngIf="showLoginModal" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <app-login
        [closeModal]="closeModalFn"
        [openSignup]="openSignupFromLogin">
      </app-login>
    </div>
  </div>

  <!-- Signup Modal -->
  <div class="modal-overlay" *ngIf="showSignupModal" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <app-signup
        [closeModal]="closeModalFn"
        [openLogin]="openLoginFromSignup">
      </app-signup>
    </div>
  </div>
</nav>
