<div class="product-card" (click)="openProduct()">
  <img [src]="product.thumbnail" [alt]="product.title" class="product-thumb" />
  <div class="product-info">
    <h3>{{ product.title }}</h3>
    <p class="desc">{{ product.description }}</p>
    <div class="price-rating">
      <span class="price">₹{{ product.price | number:'1.2-2' }}</span>
    </div>

    <div class="qty-control" (click)="$event.stopPropagation()">
      <button class="qty-btn" (click)="decQty($event)" aria-label="Decrease">−</button>
      <div class="qty-display">{{ qty }}</div>
      <button class="qty-btn" (click)="incQty($event)" aria-label="Increase">+</button>
    </div>

    <div class="product-actions" (click)="$event.stopPropagation()">
      <button class="cart-btn" (click)="onAddToCart($event)">Add to Cart</button>
      <button class="buy-now" (click)="onBuyNow($event)">Buy Now</button>
    </div>
  </div>
</div>
