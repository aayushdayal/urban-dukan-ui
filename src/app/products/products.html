<div class="products-container">
  <h2>Products ({{ total }})</h2>

  <!-- Search results banner -->
  <div *ngIf="searchQuery" class="search-result-banner">
    <div>Showing results for - <b>"{{ searchQuery }}" </b> .</div>
    <button aria-label="Close search results" (click)="clearSearch()" style="background:transparent;border:none;font-size:1.2rem;cursor:pointer;">&times;</button>
  </div>

  <div *ngIf="error" class="error">{{ error }}</div>
  <div class="products-grid">
    <app-product-card
      *ngFor="let product of products"
      [product]="product"
      (addToCart)="onAddToCart($event)"
      (buyNow)="onBuyNow($event)"
      [attr.id]="'product-' + product.id">
    </app-product-card>
  </div>
  <div *ngIf="loading" class="loading">Loading more products...</div>
  <div *ngIf="allLoaded && !loading" class="end-message">All products loaded.</div>
</div>
