<div class="products-container">
  <h2>Products ({{ total }})</h2>
  <div *ngIf="error" class="error">{{ error }}</div>
  <div class="products-grid">
    <app-product-card
      *ngFor="let product of products"
      [product]="product"
      (addToCart)="onAddToCart($event)"
      (buyNow)="onBuyNow($event)"
      [attr.id]="'product-' + product.id">
    </app-product-card>
  </div>
  <div *ngIf="loading" class="loading">Loading more products...</div>
  <div *ngIf="allLoaded && !loading" class="end-message">All products loaded.</div>
</div>
