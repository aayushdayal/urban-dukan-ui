<div class="orders-page">
  <h2>Recent Orders</h2>

  <div *ngIf="loading" class="loading">Loading orders…</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="!loading && orders?.length === 0" class="empty">
    You have no recent orders.
  </div>

  <ul class="orders-list" *ngIf="orders?.length">
    <li class="order-item" *ngFor="let o of orders" (click)="open(o)" tabindex="0" role="button" aria-pressed="false">
      <div class="left">
        <div class="oid">Order ID: <strong>{{ o.orderId }}</strong></div>
        <div class="date">{{ o.createdAt | date:'short' }}</div>
      </div>
      <div class="right">
        <div class="amount">₹{{ o.totalAmount | number:'1.2-2' }}</div>
        <div class="status" [attr.data-status]="o.status"></div>
      </div>
    </li>
  </ul>
</div>
